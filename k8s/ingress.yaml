apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hk-bus-ingress
  namespace: hk-bus
  annotations:
    # Ingress Controller (replaces AWS API Gateway)
    # Use traefik for k3s, nginx for standard K8s with nginx-ingress
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      # Backend API — all /api/* requests go to the Express server
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: hk-bus-api
            port:
              number: 3000

      # WebSocket — Socket.io connection for real-time ETA push
      - path: /socket.io/
        pathType: ImplementationSpecific
        backend:
          service:
            name: hk-bus-api
            port:
              number: 3000

      # Everything else — serve the React frontend (bundled into the backend image)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hk-bus-api
            port:
              number: 3000
