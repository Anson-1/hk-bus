apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hk-bus-api-hpa
  namespace: hk-bus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hk-bus-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
