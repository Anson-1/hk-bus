metadata:
  name: compute-analytics
  namespace: openfaas-fn
  labels:
    faas_function: compute-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      faas_function: compute-analytics
  template:
    metadata:
      labels:
        faas_function: compute-analytics
    spec:
      containers:
      - name: compute-analytics
        image: ansonhui123/compute-analytics:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: "postgres-db.hk-bus.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "hkbus"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: compute-analytics
  namespace: openfaas-fn
  labels:
    faas_function: compute-analytics
spec:
  selector:
    faas_function: compute-analytics
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
# ── CronJob: trigger kmb-fetcher every minute ────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kmb-fetcher-cron
  namespace: hk-bus
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: invoke
            image: curlimages/curl:latest
            imagePullPolicy: IfNotPresent
            command:
            - sh
            - -c
            - |
              curl -sf --max-time 120 -X POST \
                http://kmb-fetcher.openfaas-fn.svc.cluster.local:8080/ \
                -H "Content-Type: application/json" \
                -d '{}'
---
# ── CronJob: trigger compute-analytics every hour ────────────────────────────
apiVersion: batch/v1
