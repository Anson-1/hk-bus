# ── delay-alerter: Redis Stream consumer ────────────────────────────────────
# Equivalent: AWS Lambda triggered by Kinesis Stream
# Reads from Redis Stream kmb-eta-raw → writes delay alerts to Postgres
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delay-alerter
  namespace: hk-bus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delay-alerter
  template:
    metadata:
      labels:
        app: delay-alerter
    spec:
      containers:
      - name: delay-alerter
        image: ansonhui123/delay-alerter:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3004
        env:
        - name: DB_HOST
          value: "postgres-db.hk-bus.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "hkbus"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: REDIS_URL
          value: "redis://redis.hk-bus.svc.cluster.local:6379"
        - name: STREAM_KEY
          value: "kmb-eta-raw"
        - name: THRESHOLD_MIN
          value: "10"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: delay-alerter
  namespace: hk-bus
spec:
  selector:
    app: delay-alerter
  ports:
  - port: 3004
    targetPort: 3004
  type: ClusterIP
---
