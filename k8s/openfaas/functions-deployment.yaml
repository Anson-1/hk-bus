# ── CronJob: trigger spark-analytics daily at 2am HKT ───────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: spark-analytics-cron
  namespace: hk-bus
spec:
  schedule: "0 18 * * *"   # 18:00 UTC = 02:00 HKT daily
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: invoke
            image: curlimages/curl:latest
            imagePullPolicy: IfNotPresent
            command:
            - sh
            - -c
            - |
              curl -sf --max-time 600 -X POST \
                http://spark-analytics.openfaas-fn.svc.cluster.local:8080/ \
                -H "Content-Type: application/json" \
                -d '{}'
