# OpenFaaS functions deployed as K8s Deployments in openfaas-fn namespace.
# The OpenFaaS gateway auto-discovers services here and proxies
#   POST /function/<name>  →  http://<name>.openfaas-fn:8080/
# This is the same pattern AWS Lambda uses: function container + invoker.

# ── kmb-fetcher ──────────────────────────────────────────────────────────────
# Equivalent: AWS Lambda triggered by CloudWatch Events every minute
# Fetches KMB ETA from government API → publishes to Redis Stream (Kinesis equiv)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kmb-fetcher
  namespace: openfaas-fn
  labels:
    faas_function: kmb-fetcher
spec:
  replicas: 1
  selector:
    matchLabels:
      faas_function: kmb-fetcher
  template:
    metadata:
      labels:
        faas_function: kmb-fetcher
    spec:
      containers:
      - name: kmb-fetcher
        image: ansonhui123/kmb-fetcher:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_URL
          value: "redis://redis.hk-bus.svc.cluster.local:6379"
        - name: STREAM_KEY
          value: "kmb-eta-raw"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kmb-fetcher
  namespace: openfaas-fn
  labels:
    faas_function: kmb-fetcher
spec:
  selector:
    faas_function: kmb-fetcher
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
# ── compute-analytics ────────────────────────────────────────────────────────
apiVersion: apps/v1
