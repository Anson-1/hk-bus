apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: hk-bus
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: PostgreSQL
        type: postgres
        url: postgres-db.hk-bus.svc.cluster.local:5432
        database: hk_bus
        user: postgres
        secureJsonData:
          password: postgres
        jsonData:
          sslmode: disable
          postgresVersion: 1600
      - name: Prometheus
        type: prometheus
        url: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: hk-bus
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: HK Bus
        type: file
        options:
          path: /var/lib/grafana/dashboards
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: hk-bus
data:
  analytics-dashboard.json: |
    {
      "uid": "hkbus-analytics",
      "title": "KMB Analytics Dashboard",
      "schemaVersion": 38,
      "refresh": "5m",
      "time": { "from": "now-7d", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Route Ranking by Average Wait",
          "type": "table",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 10 },
          "datasource": "PostgreSQL",
          "targets": [{
            "rawSql": "SELECT route, ROUND(AVG(avg_wait_sec)::numeric, 1) AS avg_wait_sec, ROUND(AVG(p95_wait_sec)::numeric, 1) AS p95_wait_sec FROM eta_analytics GROUP BY route ORDER BY avg_wait_sec DESC LIMIT 22",
            "format": "table"
          }]
        },
        {
          "id": 2,
          "title": "Average Wait by Hour of Day",
          "type": "barchart",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 10 },
          "datasource": "PostgreSQL",
          "targets": [{
            "rawSql": "SELECT hour_of_day, ROUND(AVG(avg_wait_sec)::numeric, 1) AS avg_wait_sec FROM eta_analytics GROUP BY hour_of_day ORDER BY hour_of_day",
            "format": "table"
          }]
        },
        {
          "id": 3,
          "title": "P95 Wait Time Trend (7 Days)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 10, "w": 24, "h": 8 },
          "datasource": "PostgreSQL",
          "targets": [{
            "rawSql": "SELECT computed_at AS time, route AS metric, p95_wait_sec AS value FROM eta_analytics WHERE computed_at >= NOW() - INTERVAL '7 days' ORDER BY computed_at",
            "format": "time_series"
          }]
        }
      ]
    }
  data-dashboard.json: |
    {
      "uid": "hkbus-data",
      "title": "KMB Bus Data Dashboard",
      "schemaVersion": 38,
      "refresh": "5s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Average Wait Time by Route (Current Window)",
          "type": "barchart",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": "PostgreSQL",
          "targets": [{
            "rawSql": "SELECT route || ' ' || dir AS route, ROUND(avg_wait_sec::numeric, 0) AS avg_wait_sec FROM eta_realtime WHERE window_start = (SELECT MAX(window_start) FROM eta_realtime) AND route IS NOT NULL ORDER BY avg_wait_sec DESC",
            "format": "table"
          }]
        },
        {
          "id": 2,
          "title": "Delayed Routes Right Now (wait > 10 min)",
          "type": "table",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": "PostgreSQL",
          "options": { "cellHeight": "sm" },
          "fieldConfig": {
            "overrides": [{
              "matcher": { "id": "byName", "options": "avg_wait_sec" },
              "properties": [{
                "id": "custom.displayMode",
                "value": "color-background"
              }, {
                "id": "thresholds",
                "value": {
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 600 }
                  ]
                }
              }]
            }]
          },
          "targets": [{
            "rawSql": "SELECT route, dir, ROUND(avg_wait_sec::numeric, 0) AS avg_wait_sec, sample_count FROM eta_realtime WHERE avg_delay_flag = 1 AND window_start >= NOW() - INTERVAL '2 hours' AND route IS NOT NULL ORDER BY avg_wait_sec DESC",
            "format": "table"
          }]
        },
        {
          "id": 3,
          "title": "Wait Time Trend — Last 30 Minutes",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 },
          "datasource": "PostgreSQL",
          "targets": [{
            "rawSql": "SELECT window_start AS time, route || ' ' || dir AS metric, avg_wait_sec AS value FROM eta_realtime WHERE window_start >= NOW() - INTERVAL '30 hours' AND route IS NOT NULL ORDER BY window_start",
            "format": "time_series"
          }]
        },
        {
          "id": 4,
          "title": "Sample Count by Route",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 6 },
          "datasource": "PostgreSQL",
          "targets": [{
            "rawSql": "SELECT route || ' ' || dir AS route, SUM(sample_count) AS total_samples FROM eta_realtime WHERE route IS NOT NULL GROUP BY route, dir ORDER BY total_samples DESC",
            "format": "table"
          }]
        },
        {
          "id": 5,
          "title": "Delayed Routes (Flag=1) Count",
          "type": "stat",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 6 },
          "datasource": "PostgreSQL",
          "targets": [{
            "rawSql": "SELECT COUNT(*) AS delayed_windows FROM eta_realtime WHERE avg_delay_flag = 1",
            "format": "table"
          }]
        }
      ]
    }
  infra-dashboard.json: |
    {
      "uid": "hkbus-infra",
      "title": "Infrastructure Dashboard (Serverless Demo)",
      "schemaVersion": 38,
      "refresh": "5s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "kmb-fetcher Pod Count — Scale to Zero",
          "description": "Watch this oscillate 0 → 1 → 0 every minute — this is serverless autoscaling",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 20 },
              "color": { "fixedColor": "blue", "mode": "fixed" }
            }
          },
          "targets": [{
            "expr": "kube_deployment_status_replicas_available{namespace='openfaas-fn', deployment=~'kmb-fetcher.*'}",
            "legendFormat": "kmb-fetcher replicas"
          }]
        },
        {
          "id": 2,
          "title": "Kafka Messages/sec (kmb-eta-raw)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [{
            "expr": "rate(kafka_server_brokertopicmetrics_messagesin_total{topic='kmb-eta-raw'}[1m])",
            "legendFormat": "messages/sec"
          }]
        },
        {
          "id": 3,
          "title": "Pod CPU Usage — hk-bus namespace",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='hk-bus', container!=''}[2m])) by (pod)",
            "legendFormat": "{{ pod }}"
          }]
        },
        {
          "id": 4,
          "title": "Pod Memory Usage — hk-bus namespace",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{namespace='hk-bus', container!=''}) by (pod)",
            "legendFormat": "{{ pod }}"
          }]
        }
      ]
    }
