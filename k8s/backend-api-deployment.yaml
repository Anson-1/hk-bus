apiVersion: apps/v1
kind: Deployment
metadata:
  name: hk-bus-api
  namespace: hk-bus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hk-bus-api
  template:
    metadata:
      labels:
        app: hk-bus-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: hk-bus-api
          image: ansonhui123/hk-bus-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: ETA_AGGREGATOR_URL
              value: "http://eta-aggregator.hk-bus.svc.cluster.local:3003"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: hk-bus-api
  namespace: hk-bus
spec:
  type: ClusterIP
  selector:
    app: hk-bus-api
  ports:
    - port: 3000
      targetPort: 3000
      name: http
