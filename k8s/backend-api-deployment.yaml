apiVersion: v1
kind: ConfigMap
metadata:
  name: hk-bus-api-config
  namespace: hk-bus
data:
  .env: |
    DB_HOST=postgres-db.hk-bus.svc.cluster.local
    DB_PORT=5432
    DB_NAME=hk_bus
    DB_USER=postgres
    DB_PASSWORD=postgres
    PORT=3001
    NODE_ENV=production
    KMB_API_BASE=https://data.etabus.gov.hk/v1/transport/kmb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hk-bus-api
  namespace: hk-bus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hk-bus-api
  template:
    metadata:
      labels:
        app: hk-bus-api
    spec:
      containers:
        - name: api
          image: ansonhui123/hk-bus-api:v8
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOST
              value: postgres-db.hk-bus.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: hk_bus
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: hk-bus-api
  namespace: hk-bus
spec:
  type: ClusterIP
  selector:
    app: hk-bus-api
  ports:
    - port: 3001
      targetPort: 3001
      name: http
