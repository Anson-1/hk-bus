apiVersion: apps/v1
kind: Deployment
metadata:
  name: hk-bus-api
  namespace: hk-bus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hk-bus-api
  template:
    metadata:
      labels:
        app: hk-bus-api
    spec:
      containers:
        - name: hk-bus-api
          image: ansonhui123/hk-bus-web-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: DB_HOST
              value: "postgres-db.hk-bus.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "hkbus"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: hk-bus-api
  namespace: hk-bus
spec:
  type: ClusterIP
  selector:
    app: hk-bus-api
  ports:
    - port: 3000
      targetPort: 3000
      name: http
