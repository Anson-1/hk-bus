apiVersion: batch/v1
kind: Job
metadata:
  name: generate-test-data
  namespace: hk-bus
spec:
  template:
    spec:
      containers:
      - name: generator
        image: ansonhui123/hk-bus-eta-fetcher:v15-fix
        command: ["node", "-e", "
const { Pool } = require('pg');
const pool = new Pool({
  host: 'postgres-db.hk-bus.svc.cluster.local',
  port: 5432,
  database: 'hk_bus',
  user: 'postgres',
  password: process.env.DB_PASSWORD || 'postgres'
});

const TEST_STOPS = ['18492910339410B1', '9ED7E93749ABAE67', '9583BCF159B682BA'];
const ROUTES = ['1', '1A', '2', '3C', '5', '6', '6C', '9', '11', '12', '13D', '15', '26', '40', '42C', '68X', '74B', '91M', '91P', '98D', '270', 'N8'];

(async () => {
  try {
    let inserted = 0;
    for (const route of ROUTES) {
      for (const stop of TEST_STOPS) {
        const busCount = Math.floor(Math.random() * 3) + 2;
        for (let i = 0; i < busCount; i++) {
          const waitSec = Math.floor(Math.random() * 20) + 5;
          const delayFlag = Math.random() < 0.1;
          const query = 'INSERT INTO eta_raw (route, dir, stop_id, wait_sec, delay_flag, fetched_at) VALUES (\$1, \$2, \$3, \$4, \$5, CURRENT_TIMESTAMP)';
          await pool.query(query, [route, 'O', stop, waitSec, delayFlag]);
          inserted++;
        }
      }
    }
    console.log(\`✅ Inserted \${inserted} records\`);
    process.exit(0);
  } catch(e) {
    console.error('Error:', e);
    process.exit(1);
  }
})();
        "]
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
      restartPolicy: Never
  backoffLimit: 3
