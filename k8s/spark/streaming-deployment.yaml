apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-streaming
  namespace: hk-bus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-streaming
  template:
    metadata:
      labels:
        app: spark-streaming
    spec:
      containers:
        - name: spark-streaming
          image: ansonhui123/kmb-spark:v2
          imagePullPolicy: IfNotPresent
          command: ["spark-submit"]
          args:
            - "--master=local[2]"
            - "/opt/spark/jobs/streaming_job.py"
          env:
            - name: KAFKA_BROKER
              value: "kafka-broker.hk-bus.svc.cluster.local:9092"
            - name: KAFKA_TOPIC
              value: "kmb-eta-raw"
            - name: POSTGRES_HOST
              value: "postgres.hk-bus.svc.cluster.local"
            - name: POSTGRES_DB
              value: "hkbus"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
