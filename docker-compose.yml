services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: hk-bus-postgres
    environment:
      POSTGRES_DB: hkbus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./k8s/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hkbus"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hk-bus-network

  # ── ETA Fetcher (polls KMB + MTR APIs → PostgreSQL directly) ──
  # Replaces: AWS IoT device + Kinesis ingest (continuous collection path)
  eta-fetcher:
    build:
      context: ./k8s/eta-fetcher
    container_name: hk-bus-eta-fetcher
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hkbus
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POLL_INTERVAL: 15000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hk-bus-network
    restart: unless-stopped

  # ── KMB Fetcher (KMB API → Redis Stream) ─────────────────────
  # Replaces: AWS Lambda ingest function + Kinesis producer
  # Mirrors the OpenFaaS kmb-fetcher function used in Kubernetes.
  kmb-fetcher:
    image: heiheivan/kmb-fetcher:latest
    container_name: hk-bus-kmb-fetcher
    environment:
      REDIS_URL: redis://redis:6379
      STREAM_KEY: kmb-eta-raw
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hk-bus-network
    restart: unless-stopped

  # ── Delay Alerter (Redis Stream consumer → delay_alerts table) ─
  # Replaces: AWS Lambda triggered by Kinesis
  # Mirrors the delay-alerter Deployment used in Kubernetes.
  delay-alerter:
    image: heiheivan/delay-alerter:latest
    container_name: hk-bus-delay-alerter
    environment:
      REDIS_URL: redis://redis:6379
      STREAM_KEY: kmb-eta-raw
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hkbus
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      THRESHOLD_MIN: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hk-bus-network
    restart: unless-stopped

  # ── Web App (frontend + backend API) ─────────────────────────
  web-app:
    build:
      context: ./web-app
    container_name: hk-bus-web
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hkbus
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health',(r)=>{process.exit(r.statusCode===200?0:1)})\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hk-bus-network
    restart: unless-stopped

  # ── Redis (ElastiCache replacement) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hk-bus-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - hk-bus-network
    restart: unless-stopped

  # ── Prometheus (CloudWatch replacement) ──────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: hk-bus-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - hk-bus-network
    restart: unless-stopped

  # ── Redis Exporter (exposes Redis metrics to Prometheus) ─────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: hk-bus-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - hk-bus-network
    restart: unless-stopped

  # ── Grafana (QuickSight replacement) ─────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: hk-bus-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-hkbus123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboard-files:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - hk-bus-network
    restart: unless-stopped

networks:
  hk-bus-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
