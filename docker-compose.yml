services:
  # PostgreSQL Database - stores weather data and analytics
  postgres-db:
    image: postgres:15
    container_name: hk-bus-postgres
    environment:
      POSTGRES_DB: hk_bus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./k8s/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hk-bus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Data Collectors - weather (hourly), KMB ETA (30s), road speed (2min)
  weather-fetcher:
    build:
      context: ./functions/weather-fetcher
    container_name: hk-bus-weather-fetcher
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: hk_bus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - hk-bus-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Web App - frontend interface
  web-app:
    image: ansonhui123/hk-bus-web:v16
    container_name: hk-bus-web
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: hk_bus
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - hk-bus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana - dashboards and data visualization
  grafana:
    image: grafana/grafana:10.4.0
    container_name: hk-bus-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./k8s/grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - hk-bus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  hk-bus-network:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:
