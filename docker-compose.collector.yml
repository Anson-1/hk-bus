services:

  redis:
    image: redis:7-alpine
    container_name: hk-bus-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: hk-bus-postgres
    command: ["-c", "timezone=Asia/Hong_Kong"]
    environment:
      POSTGRES_DB: hkbus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hkbus"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  eta-fetcher:
    build:
      context: ./k8s/eta-fetcher
    container_name: hk-bus-eta-fetcher
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hkbus
      DB_USER: postgres
      DB_PASSWORD: postgres
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:3002"
    restart: unless-stopped

  web-app:
    image: ansonhui123/hk-bus-web-app:latest
    container_name: hk-bus-web-app
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hkbus
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: hk-bus-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: hkbus123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboard-files:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  kmb-fetcher:
    build:
      context: ./functions/kmb-fetcher
    container_name: hk-bus-kmb-fetcher
    environment:
      REDIS_URL: redis://hk-bus-redis:6379
      STREAM_KEY: kmb-eta-raw
      CONCURRENCY: "8"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8081:8080"
    restart: unless-stopped

  delay-alerter:
    build:
      context: ./k8s/delay-alerter
    container_name: hk-bus-delay-alerter
    environment:
      REDIS_URL: redis://hk-bus-redis:6379
      DB_HOST: hk-bus-postgres
      DB_PORT: "5432"
      DB_NAME: hkbus
      DB_USER: postgres
      DB_PASSWORD: postgres
      STREAM_KEY: kmb-eta-raw
      THRESHOLD_MIN: "10"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "3004:3004"
    restart: unless-stopped

  compute-analytics:
    build:
      context: ./functions/compute-analytics
    container_name: hk-bus-compute-analytics
    environment:
      DB_HOST: hk-bus-postgres
      DB_PORT: "5432"
      DB_NAME: hkbus
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8080"
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
